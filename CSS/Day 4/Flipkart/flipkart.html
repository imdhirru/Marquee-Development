<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="flipkart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header class="header">
        <!-- Top Section -->
        <div class="top">
            <div class="flipkart">Flipkart</div>
            <div class="travel">Travel</div>
            <div class="location">Vadodara, Gujarat</div>
        </div>

        <!-- Middle Section -->
        <div class="middle">
            <input type="text" placeholder="Search more products">
            <span>Login</span>
            <span>More</span>
            <span><i class="fa fa-shopping-cart"></i></span>
        </div>

        <!-- Bottom Section - Category Boxes -->
        <div class="bottom">
            <div class="box"><i class="fa fa-mobile"></i></div>
            <!-- <div class="box"><i class="fa fa-tshirt"></i></div> -->
            <div class="box"><i class="fa fa-home"></i></div>
            <div class="box"><i class="fa fa-book"></i></div>
            <div class="box"><i class="fa fa-heart"></i></div>
            <div class="box"><i class="fa fa-camera"></i></div>
            <div class="box"><i class="fa fa-gamepad"></i></div>
            <div class="box"><i class="fa fa-music"></i></div>
            <div class="box"><i class="fa fa-gift"></i></div>
            <div class="box"><i class="fa fa-shopping-bag"></i></div>
            <div class="box"><i class="fa fa-bicycle"></i></div>
            <div class="box"><i class="fa fa-plane"></i></div>
            <div class="box"><i class="fa fa-cutlery"></i></div>
            <div class="box"><i class="fa fa-star"></i></div>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="hero">
        <div id="phone"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFlph5gF2INS4cN-ACosKbFdKXxg7kJ4iVbw&s" alt="iPhone"></div>
        <div id="kapde"><img src="https://m.media-amazon.com/images/I/61qMMGkDHfL._SY741_.jpg" alt="Clothes"></div>
        <div id="food"><img src="https://www.eatingwell.com/thmb/088YHsNmHkUQ7iNGP4375MiAXOY=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/article_7866255_foods-you-should-eat-every-week-to-lose-weight_-04-d58e9c481bce4a29b47295baade4072d.jpg" alt="Food Items"></div>
    </section>
</body>
</html>
