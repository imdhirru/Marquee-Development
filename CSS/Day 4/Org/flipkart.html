<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="flipkart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header class="header">
        <!-- Top Section -->
        <div class="top">
            <div class="flipkart">Flipkart</div>
            <div class="travel">Travel</div>
            <div class="location">Vadodara, Gujarat</div>
        </div>

        <!-- Middle Section -->
        <div class="middle">
            <input type="text" placeholder="Search for Products, Brand and More">
            <span>Login</span>
            <span>More</span>
            <span><i class="fa fa-shopping-cart"></i></span>
        </div>

        <!-- Bottom Section - Category Boxes -->
        <div class="bottom">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </header>

    <!-- Banner Section -->
    <section class="banners">
        <div class="banner-item">
            <img src="https://rukminim2.flixcart.com/fk-p-flap/1600/780/image/a393addc6186a649.jpg?q=80" alt="Product1">
        </div>
        <div class="banner-item">
            <img src="https://rukminim2.flixcart.com/fk-p-flap/1600/780/image/b15b730bbfd09fce.jpg?q=80" alt="Product2">
        </div>
        <div class="banner-item">
            <img src="https://rukminim2.flixcart.com/fk-p-flap/1600/780/image/b0a8dd41775c3d0f.png?q=80" alt="Product3">
        </div>
    </section>

    <!-- Hero Section -->
    <section id="hero">
        <div id="phone"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFlph5gF2INS4cN-ACosKbFdKXxg7kJ4iVbw&s" alt="Product1"></div>
        <div id="kapde"><img src="https://m.media-amazon.com/images/I/61qMMGkDHfL._SY741_.jpg" alt="Product2"></div>
        <div id="food"><img src="https://www.eatingwell.com/thmb/088YHsNmHkUQ7iNGP4375MiAXOY=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/article_7866255_foods-you-should-eat-every-week-to-lose-weight_-04-d58e9c481bce4a29b47295baade4072d.jpg" alt="Product3"></div>
        <div><img src="https://rukminim2.flixcart.com/fk-p-thumbnail/315/560/images/cgt/FPS/CND3DV1KpTTvabBvxjRRylZw/manifest.jpg?q=80" alt="Product4"></div>
        <div><img src="https://rukminim2.flixcart.com/image/1871/1871/xif0q/headphone/u/x/d/-original-imaheqnpzbhh8sy9.jpeg?q=90" alt="Product5"></div>
        <div><img src="https://rukminim2.flixcart.com/image/1871/1871/xif0q/shoe/d/c/c/7-rsl1297-7-red-tape-green-white-original-imahhwhgcrtkvxmg.jpeg?q=90" alt="Product6"></div>
    </section>

    <!-- Products Section -->
    <section class="products">
        <div class="section-title">Best Deals</div>
        <div class="product-card">
            <img src="https://typsybeauty.com/cdn/shop/articles/Benefits_of_Wearing_Makeup_for_Women_e68ced41-2a26-4e0d-8af9-09dd6c33da97.jpg?v=1772516587" alt="Makeup organiser" class="product-image">
            <div class="product-info">
                <div class="product-price-tag">From ₹188</div>
                <div class="product-name">Makeup Organisers</div>
                <div class="product-price">$49</div>
            </div>
        </div>
        <div class="product-card">
            <img src="https://imgmediagumlet.lbb.in/media/2024/07/669e2e6d5b38bb58d30bd6b1_1721642605705.jpg" alt="Makeup organiser" class="product-image">
            <div class="product-info">
                <div class="product-price-tag">From ₹188</div>
                <div class="product-name">Makeup Organisers</div>
                <div class="product-price">$49</div>
            </div>
        </div>
        <div class="product-card">
            <img src="https://www.lotus.in/cdn/shop/articles/7.jpg?v=1643719868&width=2048" alt="Makeup organiser" class="product-image">
            <div class="product-info">
                <div class="product-price-tag">From ₹188</div>
                <div class="product-name">Makeup Organisers</div>
                <div class="product-price">$49</div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-title">Flipkart</div>
            <div class="footer-link">Best place to buy.</div>
        </div>
        <div class="footer-content">
            <div class="footer-title">About</div>
            <div class="footer-link">Contact us</div>
            <div class="footer-link">About us</div>
            <div class="footer-link">Careers</div>
            <div class="footer-link">Information</div>
        </div>
        <div class="footer-content">
            <div class="footer-title">Help</div>
            <div class="footer-link">Payment</div>
            <div class="footer-link">Orders</div>
            <div class="footer-link">Cancellation</div>
            <div class="footer-link">FAQ</div>
        </div>
    </footer>
</body>
</html>
