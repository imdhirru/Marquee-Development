<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<link rel="stylesheet" href="style.css">

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="card">

    <img src="profile.png" class="profile-img" alt="profile">

    <h1>DHIRAJ</h1>

    <p class="role">Full Stack MERN Developer </p>

    <div class="skills">
        <span>Java</span>
        <span>Python</span>
        <span>C</span>
    </div>

    <div class="buttons">

        <a href="https://github.com/" target="_blank" class="btn github">
            <i class="fab fa-github"></i> GitHub
        </a>

        <a href="https://linkedin.com/" target="_blank" class="btn linkedin">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>

        <a href="https://leetcode.com/" target="_blank" class="btn leetcode">
            <i class="fas fa-code"></i> LeetCode
        </a>

    </div>

</div>

</body>
</html>
