<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="#">
        <label for="username">Username</label>
        <input type="username" placeholder="Enter Username"><br>

        <label for="email">Email</label>
        <input type="email" placeholder="example@mail.com"><br>

        <label for="password">Password</label>
        <input type="password" placeholder="Enter Password"><br>

        <label for="date">DOB</label>
        <input type="date" placeholder="Enter Date of Birth"><br>

        <label for="number">Ranking</label>
        <input type="number" placeholder="Enter Your Ranking"><br>

        <label for="text">Remarks</label>
        <input type="text" placeholder="Enter Something"><br>

        <label for="file">Upload</label>
        <input " type="file" placeholder="Upload a File">

    </form>
</body>
</html>
