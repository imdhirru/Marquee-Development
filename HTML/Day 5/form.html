<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <!-- Header -->
     <header>
        <h1>Job Application Form</h1>
     </header>

     <main>
        <form>
            <!-- Personal Information -->
            <fieldset>
                <legend>Personal Information</legend>

                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Example Kumar" required>
                <br><br>
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="example@mail.com" required><br><br>
                <label for="Phone">Phone Number</label>
                <input type="tel" id="Phone" placeholder="123-4567-890" required><br><br>
                <label for="dob">D.O.B</label>
                <input type="date" id="dob" required>
            </fieldset>
            <br><br>

            <!-- Gender Information -->
             <fieldset>
                <legend>Gender Information</legend>

                <label for="Male">Male</label>
                <input type="radio" id="Male">

                <label for="Female">Female</label>
                <input type="radio" id="Female">

                <label for="Others">Others</label>
                <input type="radio"  id="Others">
             </fieldset>

             <br><br>

             <!-- Skills -->
             <fieldset>
                <legend>Skills Information</legend>

                <input type="checkbox" id="mern">
                <label for="mern">MERN</label>
                <br>
                <input type="checkbox" id="aidev">
                <label for="aidev">AI Developer</label>
                <br>
                <input type="checkbox" id="dataAnalyst">
                <label for="dataAnalyst">Data Analyst</label>
                <br>
                <input type="checkbox" id="cloud">
                <label for="cloud">Cloud Engineer</label>
                <br>
                <input type="checkbox" id="androidDev">
                <label for="androidDev">Android Developer</label>
             </fieldset>

             <br><br>
             <!-- Additional Information -->
              <fieldset>
                <legend>Additional Information</legend>
                <!-- Experience -->
                 <label for="experience">Years of Experience</label>
                 <select id="experience" required>
                    <option desabled selected>Select Year</option>
                    <option>Fresher</option>
                    <option>1 Years</option>
                    <option>2 Years</option>
                    <option>3 Years</option>
                    <option>4 Years</option>
                    <option>5+ Years</option>
                 </select>
                 <br><br>
                 <label for="location">Preffered Location</label>
                <select id="location">
                    <option value="vd">Vadodara</option>
                    <option value="vd">Amdavad</option>
                    <option value="vd">Gandhi-Nagar</option>
                    <option value="vd">Surat</option>
                </select>

                <!-- Upload Resume -->
                 <br><br>
                 <label for="Resume">Upload Resume</label>
                 <input type="file" id="Resume">


              </fieldset>
              <br><br>
              <!-- Submit and Reset Button -->
               <button style="background-color: rgb(102, 0, 255); color: white;" type="submit">Submit</button>
               <button style="background-color: red; color: white;" type="reset">Reset</button>

        </form>
     </main>
</body>
</html>
